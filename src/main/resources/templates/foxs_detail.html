<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fox Detail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🦊 Fox Management</span>
        <a href="/foxs/" class="btn btn-outline-light btn-sm">Back to List</a>
    </div>
</nav>

<div class="container d-flex justify-content-center mt-5">
    <div class="card shadow border-0" style="width: 28rem;">
        <div class="card-header text-white text-center py-3" style="background-color: #fd7e14;">
            <h3 class="card-title mb-0">🦊 Fox Profile</h3>
        </div>
        <div class="card-body p-4">

            <ul class="list-group list-group-flush mb-4">
                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                    <span class="text-muted fw-bold">Name:</span>
                    <span class="fs-5 text-dark fw-semibold" th:text="${fox.name}">Fox Name</span>
                </li>
                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                    <span class="text-muted fw-bold">Age:</span>
                    <span class="badge bg-secondary rounded-pill fs-6" th:text="${fox.age} + ' years'">3 years</span>
                </li>
                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                    <span class="text-muted fw-bold">Location / Revir:</span>
                    <span class="text-secondary fw-medium" th:text="${fox.place}">Forest</span>
                </li>
                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                    <span class="text-muted fw-bold">Owner:</span>
                    <span class="fw-medium" style="color: #fd7e14;" th:text="${fox.user != null ? fox.user.username : 'No Owner'}">Owner Name</span>
                </li>
            </ul>

            <div class="d-flex gap-2">
                <a th:href="@{/foxs/{id}/edit(id=${fox.id})}" class="btn btn-warning flex-grow-1 fw-bold">✏️ Edit</a>
                <a th:href="@{/foxs/{id}/delete(id=${fox.id})}" class="btn btn-danger flex-grow-1" onclick="return confirm('Are you sure you want to delete this fox?')">🗑️ Delete</a>
            </div>
        </div>
        <div class="card-footer bg-white border-top-0 text-center pb-3">
            <a href="/" class="text-decoration-none text-muted btn btn-link btn-sm">Return to Dashboard</a>
        </div>
    </div>
</div>

</body>
</html>
