<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🛡️ Admin Zone: User Management</span>
        <a href="/" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
    </div>
</nav>

<div class="container bg-white p-4 rounded shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 text-secondary mb-0">System Users</h1>
        <a th:href="@{/users/create}" class="btn btn-dark fw-bold">👤 Create New User</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle border">
            <thead class="table-dark">
            <tr>
                <th style="width: 10%">ID</th>
                <th style="width: 30%">Full Name (Click for profile)</th>
                <th style="width: 25%">Username (Login)</th>
                <th style="width: 15%">Role</th>
                <th style="width: 20%" class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td class="fw-bold text-muted" th:text="${user.id}">1</td>
                <td>
                    <a th:href="@{/users/{id}(id=${user.id})}" class="text-decoration-none fw-semibold text-dark" th:text="${user.name}">John Doe</a>
                </td>
                <td>
                    <code class="text-secondary" th:text="${user.username}">johndoe123</code>
                </td>
                <td>
                            <span th:class="${user.role == 'ADMIN' || user.role == 'ROLE_ADMIN'} ? 'badge bg-danger' : 'badge bg-info text-dark'"
                                  th:text="${user.role}">USER</span>
                </td>
                <td>
                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-warning">✏️ Edit</a>
                        <a th:href="@{/users/{id}/delete(id=${user.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this user? This might orphan their registered animals!')">🗑️ Delete</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="5" class="text-center text-muted py-4">No users found in the system.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
