<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id != 0 ? 'Edit User' : 'New User'}">Save User</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🛡️ Admin Zone: User Management</span>
        <a href="/users/" class="btn btn-outline-light btn-sm">Back to Users List</a>
    </div>
</nav>

<div class="container d-flex justify-content-center mt-4">
    <div class="card shadow border-0" style="width: 32rem;">
        <div class="card-header bg-dark text-white text-center py-3">
            <h3 class="card-title mb-0" th:text="${user.id != 0 ? '✏️ Edit User Account' : '👤 Create New User'}">Save User</h3>
        </div>

        <div class="card-body p-4">
            <form th:action="@{/users/save}" method="post" th:object="${user}">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="name" class="form-label fw-bold text-secondary">Full Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="e.g. John Doe" required>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label fw-bold text-secondary">Username (Login)</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="e.g. johndoe123" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-bold text-secondary">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Enter secure password" required>
                    <div class="form-text text-muted" th:if="${user.id != 0}">Leave password as is or type a new one to change it.</div>
                </div>

                <div class="mb-4">
                    <label for="role" class="form-label fw-bold text-secondary">System Authority / Role</label>
                    <select id="role" th:field="*{role}" class="form-select" required>
                        <option value="USER">USER (Standard Access)</option>
                        <option value="ADMIN">ADMIN (Full Security Control)</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark flex-grow-1 py-2 fw-bold">Save User</button>
                    <a href="/users/" class="btn btn-outline-secondary flex-grow-1 py-2">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
