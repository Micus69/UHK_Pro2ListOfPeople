<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Save Cat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-4" th:text="${cat.id == 0} ? 'Add New Cat' : 'Edit Cat'">Save Cat</h1>

<form th:action="@{/cats/save}" th:object="${cat}" method="post" class="col-md-6">
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
        <label for="name" class="form-label">Cat Name:</label>
        <input type="text" id="name" th:field="*{name}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="age" class="form-label">Age:</label>
        <input type="number" id="age" th:field="*{age}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="place" class="form-label">Favorite Place:</label>
        <input type="text" id="place" th:field="*{place}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="user" class="form-label">Owner:</label>
        <select id="user" th:field="*{user}" class="form-select">
            <option value="">-- Select Owner --</option>
            <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.username}"></option>
        </select>
    </div>

    <button type="submit" class="btn btn-success">Save</button>
    <a href="/cats/" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
