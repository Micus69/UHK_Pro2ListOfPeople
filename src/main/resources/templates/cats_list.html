<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>List of Cats</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-4">List of Cats</h1>
<a href="/cats/create" class="btn btn-primary mb-3">Add New Cat</a>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Place</th>
        <th>Owner</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${cats}">
        <td th:text="${cat.id}">1</td>
        <td><a th:href="@{/cats/{id}(id=${cat.id})}" th:text="${cat.name}">Cat Name</a></td>
        <td th:text="${cat.age}">3</td>
        <td th:text="${cat.place}">Prague</td>
        <td th:text="${cat.user != null ? cat.user.username : 'No Owner'}">Owner</td>
        <td>
            <a th:href="@{/cats/{id}/edit(id=${cat.id})}" class="btn btn-sm btn-warning">Edit</a>
            <a th:href="@{/cats/{id}/delete(id=${cat.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
<a href="/" class="btn btn-secondary">Back to Home</a>
</body>
</html>
