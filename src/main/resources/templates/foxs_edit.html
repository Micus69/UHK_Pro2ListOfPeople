<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${fox.id != null ? 'Edit Fox' : 'New Fox'}">Save Fox</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🦊 Fox Management</span>
        <a href="/foxs/" class="btn btn-outline-light btn-sm">Back to List</a>
    </div>
</nav>

<div class="container d-flex justify-content-center mt-4">
    <div class="card shadow border-0" style="width: 32rem;">
        <div class="card-header text-white text-center py-3" style="background-color: #fd7e14;">
            <h3 class="card-title mb-0" th:text="${fox.id != null ? '✏️ Edit Fox Profile' : '➕ Add New Fox'}">Save Fox</h3>
        </div>

        <div class="card-body p-4">
            <form th:action="@{/foxs/save}" th:object="${fox}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="name" class="form-label fw-bold text-secondary">Fox Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Enter fox's name" required>
                </div>

                <div class="mb-3">
                    <label for="age" class="form-label fw-bold text-secondary">Age (Years)</label>
                    <input type="number" id="age" th:field="*{age}" class="form-control" placeholder="Enter fox's age" min="0" required>
                </div>

                <div class="mb-3">
                    <label for="place" class="form-label fw-bold text-secondary">Location / Revir</label>
                    <input type="text" id="place" th:field="*{place}" class="form-control" placeholder="e.g. Deep Forest, North Burrow" required>
                </div>

                <div class="mb-4">
                    <label for="user" class="form-label fw-bold text-secondary">Owner / Caregiver</label>
                    <select id="user" th:field="*{user}" class="form-select">
                        <option value="">-- Select Owner (Optional) --</option>
                        <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.username}"></option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn text-white flex-grow-1 py-2 fw-bold" style="background-color: #fd7e14;">Save Changes</button>
                    <a href="/foxs/" class="btn btn-outline-secondary flex-grow-1 py-2">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
